<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transcriber</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-container">
    <h2>🔒 Bakla si lans</h2>
    <p>Enter password to access</p>
    <input type="password" id="lockInput" placeholder="Password..." />
    <button onclick="checkPassword()">Unlock</button>
    <div id="lockError" class="lock-error"></div>
  </div>
</div>

<div id="mainContent" class="hidden">

<header>
  <h1>Cleap<span> </span></h1>
  <p>Powered by Yukari</p>
</header>

<main>
  <div>
    <label>Cleap API Key</label>
    <input type="password" id="apiKey" placeholder="gsk_..." />
    <div class="key-hint" style="margin-top:0.4rem;">Kunin niyo yung API key sa groq.</div>
  </div>

  <div>
    <label>Audio File (MP3, MP4, WAV, M4A — max 25MB)</label>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.m4a,.webm,.ogg" onchange="handleFile(this.files[0])"/>
      <span id="dropLabel">Click to choose a file, or drag and drop here</span>
    </div>
  </div>

  <button id="transcribeBtn" onclick="startTranscribe()" disabled>Transcribe</button>

  <div class="status" id="status"></div>

  <div class="search-section" id="searchSection">
    <label>Search Transcript</label>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Type a word to find..." oninput="handleSearch()" />
      <button class="nav-btn" id="prevBtn" onclick="navigateMatch(-1)" disabled>↑</button>
      <button class="nav-btn" id="nextBtn" onclick="navigateMatch(1)" disabled>↓</button>
      <span class="match-count" id="matchCount"></span>
    </div>
    <div class="search-info" id="searchInfo"></div>
  </div>

  <div class="transcript-section" id="transcriptSection">
    <div class="transcript-header">
      <span>Transcript</span>
      <span id="langLabel"></span>
    </div>
    <div class="transcript-body" id="transcriptBody"></div>
  </div>
</main>

</div>

<script src="./script.js"></script>
</body>
</html>
