<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transcriber</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff3f;
      --accent-dim: #b8cc2a;
      --text: #f0f0f0;
      --muted: #555;
      --highlight-bg: #e8ff3f22;
      --highlight-border: #e8ff3f88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    header h1 span { color: var(--accent); }
    header p { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 2.5rem;
      gap: 1.25rem;
    }

    label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .drop-zone {
      border: 1px dashed var(--border);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--highlight-bg);
      color: var(--text);
    }

    .drop-zone.has-file {
      border-color: var(--accent);
      color: var(--accent);
    }

    .drop-zone input { display: none; }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }

    button:hover { background: var(--accent-dim); }
    button:active { transform: scale(0.98); }
    button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .status { font-size: 0.75rem; color: var(--accent); letter-spacing: 0.05em; min-height: 1.2em; }
    .status.error { color: #ff6b6b; }

    .search-section { display: none; flex-direction: column; gap: 0.75rem; }
    .search-section.visible { display: flex; }

    .search-row { display: flex; gap: 0.75rem; align-items: center; }

    .search-info { font-size: 0.7rem; color: var(--muted); }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      width: auto;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
    .nav-btn:disabled { color: var(--muted); border-color: var(--border); cursor: not-allowed; }

    .match-count { font-size: 0.7rem; color: var(--accent); white-space: nowrap; }

    .transcript-section { display: none; flex-direction: column; border: 1px solid var(--border); overflow: hidden; }
    .transcript-section.visible { display: flex; }

    .transcript-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .transcript-body { max-height: 55vh; overflow-y: auto; padding: 0.5rem 0; }
    .transcript-body::-webkit-scrollbar { width: 4px; }
    .transcript-body::-webkit-scrollbar-thumb { background: var(--border); }

    .segment {
      display: flex;
      gap: 1rem;
      padding: 0.55rem 1rem;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }

    .segment:hover { background: #ffffff08; }
    .segment.highlighted { background: var(--highlight-bg); border-left-color: var(--accent); }

    .segment .ts {
      font-size: 0.72rem;
      color: var(--accent);
      white-space: nowrap;
      min-width: 4.5rem;
      padding-top: 0.1em;
      font-weight: 500;
    }

    .segment .words { font-size: 0.82rem; line-height: 1.6; color: #ccc; }
    .segment .words mark { background: var(--accent); color: #000; padding: 0 2px; border-radius: 2px; }

    .key-hint { font-size: 0.68rem; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Audio <span>Transcriber</span></h1>
  <p>Powered by Groq Whisper</p>
</header>

<main>
  <div>
    <label>Groq API Key</label>
    <input type="password" id="apiKey" placeholder="gsk_..." />
    <div class="key-hint" style="margin-top:0.4rem;">Your key stays in your browser only — never sent anywhere except Groq.</div>
  </div>

  <div>
    <label>Audio File (MP3, MP4, WAV, M4A — max 25MB)</label>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.m4a,.webm,.ogg" onchange="handleFile(this.files[0])"/>
      <span id="dropLabel">Click to choose a file, or drag and drop here</span>
    </div>
  </div>

  <button id="transcribeBtn" onclick="startTranscribe()" disabled>Transcribe</button>

  <div class="status" id="status"></div>

  <div class="search-section" id="searchSection">
    <label>Search Transcript</label>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Type a word to find..." oninput="handleSearch()" />
      <button class="nav-btn" id="prevBtn" onclick="navigateMatch(-1)" disabled>↑</button>
      <button class="nav-btn" id="nextBtn" onclick="navigateMatch(1)" disabled>↓</button>
      <span class="match-count" id="matchCount"></span>
    </div>
    <div class="search-info" id="searchInfo"></div>
  </div>

  <div class="transcript-section" id="transcriptSection">
    <div class="transcript-header">
      <span>Transcript</span>
      <span id="langLabel"></span>
    </div>
    <div class="transcript-body" id="transcriptBody"></div>
  </div>
</main>

<script>
  let segments = [];
  let matchIndices = [];
  let currentMatch = -1;
  let selectedFile = null;

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const zone = document.getElementById("dropZone");
    document.getElementById("dropLabel").textContent = `✓ ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`;
    zone.classList.add("has-file");
    checkReady();
  }

  function checkReady() {
    const key = document.getElementById("apiKey").value.trim();
    document.getElementById("transcribeBtn").disabled = !(key && selectedFile);
  }

  document.getElementById("apiKey").addEventListener("input", checkReady);

  // Drag and drop
  const dropZone = document.getElementById("dropZone");
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  async function startTranscribe() {
    const apiKey = document.getElementById("apiKey").value.trim();
    if (!apiKey || !selectedFile) return;

    const btn = document.getElementById("transcribeBtn");
    const status = document.getElementById("status");

    btn.disabled = true;
    document.getElementById("searchSection").classList.remove("visible");
    document.getElementById("transcriptSection").classList.remove("visible");
    document.getElementById("searchInput").value = "";

    status.className = "status";
    status.textContent = "Uploading to Groq Whisper...";

    try {
      const formData = new FormData();
      formData.append("file", selectedFile);
      formData.append("model", "whisper-large-v3");
      formData.append("response_format", "verbose_json");
      formData.append("timestamp_granularities[]", "segment");

      const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${apiKey}` },
        body: formData,
      });

      const data = await res.json();

      if (!res.ok) {
        status.className = "status error";
        status.textContent = "Error: " + (data.error?.message || "Unknown error");
        btn.disabled = false;
        return;
      }

      segments = (data.segments || []).map(seg => ({
        start: Math.round(seg.start * 10) / 10,
        end: Math.round(seg.end * 10) / 10,
        text: seg.text.trim(),
      }));

      renderTranscript();
      document.getElementById("langLabel").textContent = data.language ? `lang: ${data.language}` : "";
      document.getElementById("searchSection").classList.add("visible");
      document.getElementById("transcriptSection").classList.add("visible");
      status.className = "status";
      status.textContent = `✓ ${segments.length} segments transcribed`;

    } catch (e) {
      status.className = "status error";
      status.textContent = "Error: " + e.message;
    }

    btn.disabled = false;
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    const ms = Math.round((sec % 1) * 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${ms}`;
  }

  function renderTranscript(query = "") {
    const body = document.getElementById("transcriptBody");
    matchIndices = [];
    currentMatch = -1;

    body.innerHTML = segments.map((seg, i) => {
      let text = seg.text;
      let isMatch = false;

      if (query) {
        const re = new RegExp(`(${escapeRe(query)})`, "gi");
        if (re.test(text)) {
          isMatch = true;
          matchIndices.push(i);
          text = text.replace(re, "<mark>$1</mark>");
        }
      }

      return `<div class="segment ${isMatch ? 'highlighted' : ''}" id="seg-${i}">
        <span class="ts">${formatTime(seg.start)}</span>
        <span class="words">${text}</span>
      </div>`;
    }).join("");

    updateMatchNav();
  }

  function handleSearch() {
    const q = document.getElementById("searchInput").value.trim();
    renderTranscript(q);
    if (matchIndices.length > 0) { currentMatch = 0; scrollToMatch(); }
  }

  function navigateMatch(dir) {
    if (!matchIndices.length) return;
    currentMatch = (currentMatch + dir + matchIndices.length) % matchIndices.length;
    scrollToMatch();
  }

  function scrollToMatch() {
    const el = document.getElementById(`seg-${matchIndices[currentMatch]}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    updateMatchNav();
  }

  function updateMatchNav() {
    const count = matchIndices.length;
    const mc = document.getElementById("matchCount");
    const info = document.getElementById("searchInfo");
    const prev = document.getElementById("prevBtn");
    const next = document.getElementById("nextBtn");

    if (count === 0) {
      mc.textContent = document.getElementById("searchInput").value ? "0 matches" : "";
      info.textContent = "";
      prev.disabled = true;
      next.disabled = true;
    } else {
      mc.textContent = `${currentMatch + 1} / ${count} match${count > 1 ? 'es' : ''}`;
      const seg = segments[matchIndices[currentMatch]];
      info.textContent = seg ? `→ timestamp: ${formatTime(seg.start)}` : "";
      prev.disabled = false;
      next.disabled = false;
    }
  }

  function escapeRe(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") navigateMatch(1);
  });
</script>
</body>
</html>
